# LangChain4j Local LLM Configuration (LM Studio)
# LM Studio exposes an OpenAI-compatible API on localhost:1234
langchain4j:
  open-ai:
    chat-model:
      base-url: http://127.0.0.1:1234/v1
      model-name: ibm/granite-4-h-tiny
      log-requests: true
      log-responses: true
      timeout: 20s
      api-key: sk-lm-4LjIq0cR:VIueSQJU4lohBUvy7LUu
      supported-capabilities: response_format_json_schema
      strict-json-schema: true
    streaming-chat-model:
      base-url: http://127.0.0.1:1234/v1
      model-name: ibm/granite-4-h-tiny
      log-requests: true
      log-responses: true
      timeout: 20s
      api-key: sk-lm-4LjIq0cR:VIueSQJU4lohBUvy7LUu

# Application Configuration
spring:
  application:
    name: agent-sdk-framework
  main:
    banner-mode: off
    web-application-type: none
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"
  exception-conversion-word: "%wEx"
  # Log to stderr to avoid interfering with JSON-RPC on stdout
  level:
    root: INFO
    net.osgiliath.erp.codeprompt: DEBUG

# MCP Server Properties
mcp:
  server:
    name: agent-sdk
    version: 0.1.0
    protocol-version: 2024-11-05
    supported-protocol-versions:
      - 2024-11-05
codeprompt:
  acp:
    remote:
      enabled: true
      command: ${CODEPROMPT_CAGENT_COMMAND:/usr/local/bin/docker}
      # Override when your cagent CLI uses a different option shape.
      args: ${CODEPROMPT_CAGENT_ARGS:agent serve acp src/test/resources/dataset/acp-client/ping-agent.yaml}
      cwd: ${CODEPROMPT_CAGENT_CWD:.}
  mcp:
    tools:
      aliases:
          get-library-docs:
            # Context7
            - get_library_docs # Fetches up-to-date documentation for a library. You must call 'resolve-library-id' first to obtain the exact Context7-compatible library ID required to use this tool, UNLESS the user explicitly provides a library ID in the format '/org/project' or '/org/project/version' in their query.
          resolve-library-id:
            # Context7
            - resolve_library_id # Resolves a package/product name to a Context7-compatible library ID and returns a list of matching libraries. You MUST call this function before 'get-library-docs' to obtain a valid Context7-compatible library ID UNLESS the user explicitly provides a library ID in the format '/org/project' or '/org/project/version' in their query. Selection Process: 1. Analyze the query to understand what library/package the user is looking for 2. Return the most relevant match based on: - Name similarity to the query (exact matches prioritized) - Description relevance to the query's intent - Documentation coverage (prioritize libraries with higher Code Snippet counts) - Trust score (consider libraries with scores of 7-10 more authoritative) Response Format: - Return the selected library ID in a clearly marked section - Provide a brief explanation for why this library was chosen - If multiple good matches exist, acknowledge this but proceed with the most relevant one - If no good matches exist, clearly state this and suggest query refinements For ambiguous queries, request clarification before proceeding with a best-guess match.
          curl:
            # Curl
            - curl # Run a curl command.
          docker:
            # Docker
            - docker # Run a docker command.
          fetch_content:
            # Private Web Search
            - fetch_content # Fetch and extract the main text content from a webpage. Strips out navigation, headers, footers, scripts, and styles to return clean readable text. Use this after searching to read the full content of a specific result. Supports pagination for long pages via start_index and max_length.
          search:
            # Private Web Search
            - search # Search the web using DuckDuckGo. Returns a list of results with titles, URLs, and snippets. Use this to find current information, research topics, or locate specific websites. For best results, use specific and descriptive search queries.
          create_directory:
            # Filesystem Tools (Only works within allowed directories, typically a sandboxed environment for security. Always check the documentation for your specific agent implementation to understand the exact filesystem access rules and limitations.)
            - create_directory # Create a new directory or ensure a directory exists. Can create multiple nested directories in one operation. If the directory already exists, this operation will succeed silently. Perfect for setting up directory structures for projects or ensuring required paths exist. Only works within allowed directories.
          directory_tree:
            # JetBrains
            - list_directory_tree_in_folder # Provides a hierarchical tree view of the project directory structure
            # Filesystem Tools (Only works within allowed directories, typically a sandboxed environment for security. Always check the documentation for your specific agent implementation to understand the exact filesystem access rules and limitations.)
            - directory_tree # Get a recursive tree view of files and directories as a JSON structure. Each entry includes 'name', 'type' (file/directory), and 'children' for directories. Files have no children array, while directories always have a children array (which may be empty). The output is formatted with 2-space indentation for readability. Only works within allowed directories.
          edit_file:
            # Filesystem Tools (Only works within allowed directories, typically a sandboxed environment for security. Always check the documentation for your specific agent implementation to understand the exact filesystem access rules and limitations.)
            - edit_file # Make line-based edits to a text file. Each edit replaces exact line sequences with new content. Returns a git-style diff showing the changes made. Only works within allowed directories.
          get_file_info:
            # Filesystem Tools (Only works within allowed directories, typically a sandboxed environment for security. Always check the documentation for your specific agent implementation to understand the exact filesystem access rules and limitations.)
            - get_file_info # Retrieve detailed metadata about a file or directory. Returns comprehensive information including size, creation time, last modified time, permissions, and type. This tool is perfect for understanding file characteristics without reading the actual content. Only works within allowed directories.
          list_allowed_directories:
            # Filesystem Tools (Only works within allowed directories, typically a sandboxed environment for security. Always check the documentation for your specific agent implementation to understand the exact filesystem access rules and limitations.)
            - list_allowed_directories # Returns the list of directories that this server is allowed to access. Use this to understand which directories are available before trying to access files.
          list_directory:
            # JetBrains
            - list_files_in_folder # Lists all files and directories in the specified project folder
            # Filesystem Tools (Only works within allowed directories, typically a sandboxed environment for security. Always check the documentation for your specific agent implementation to understand the exact filesystem access rules and limitations.)
            - list_directory # Get a detailed listing of all files and directories in a specified path. Results clearly distinguish between files and directories with [FILE] and [DIR] prefixes. This tool is essential for understanding directory structure and finding specific files within a directory. Only works within allowed directories.
          move_file:
            # Filesystem Tools (Only works within allowed directories, typically a sandboxed environment for security. Always check the documentation for your specific agent implementation to understand the exact filesystem access rules and limitations.)
            - move_file # Move or rename files and directories. Can move files between directories and rename them in a single operation. If the destination exists, the operation will fail. Works across different directories and can be used for simple renaming within the same directory. Both source and destination must be within allowed directories.
          read_file:
            # Filesystem Tools (Only works within allowed directories, typically a sandboxed environment for security. Always check the documentation for your specific agent implementation to understand the exact filesystem access rules and limitations.)
            - read_file # Read the complete contents of a file from the file system. Handles various text encodings and provides detailed error messages if the file cannot be read. Use this tool when you need to examine the contents of a single file. Only works within allowed directories.
          read_multiple_files:
            # Filesystem Tools (Only works within allowed directories, typically a sandboxed environment for security. Always check the documentation for your specific agent implementation to understand the exact filesystem access rules and limitations.)
            - read_multiple_files # Read the contents of multiple files simultaneously. This is more efficient than reading files one by one when you need to analyze or compare multiple files. Each file's content is returned with its path as a reference. Failed reads for individual files won't stop the entire operation. Only works within allowed directories.
          search_files:
            # Filesystem Tools (Only works within allowed directories, typically a sandboxed environment for security. Always check the documentation for your specific agent implementation to understand the exact filesystem access rules and limitations.)
            - search_files # Recursively search for files and directories matching a pattern. Searches through all subdirectories from the starting path. The search is case-insensitive and matches partial names. Returns full paths to all matching items. Great for finding files when you don't know their exact location. Only searches within allowed directories.
          write_file:
            # Filesystem Tools (Only works within allowed directories, typically a sandboxed environment for security. Always check the documentation for your specific agent implementation to understand the exact filesystem access rules and limitations.)
            - write_file # Create a new file or completely overwrite an existing file with new content. Use with caution as it will overwrite existing files without warning. Handles text content with proper encoding. Only works within allowed directories.
          git_add:
            # Git (Reference)
            - git_add # Adds file contents to the staging area
            # Deactivated for testing          - git_checkout:
            # Git (Reference)
          #              - git_checkout # Switches branches
          git_commit:
            # Git (Reference)
            - git_commit # Records changes to the repository
          git_create_branch:
            # Git (Reference)
            - git_create_branch # Creates a new branch from an optional base branch
          git_diff:
            # Git (Reference)
            - git_diff # Shows differences between branches or commits
          git_diff_staged:
            # Git (Reference)
            - git_diff_staged # Shows changes that are staged for commit
          git_diff_unstaged:
            # Git (Reference)
            - git_diff_unstaged # Shows changes in the working directory that are not yet staged
          git_init:
            # Git (Reference)
            - git_init # Initializes a new Git repository
          git_log:
            # Git (Reference)
            - git_log # Shows commit logs with details
          git_reset:
            # Git (Reference)
            - git_reset # Unstages all staged changes
          git_show:
            # Git (Reference)
            - git_show # Shows details of a specific commit
          git_status:
            # JetBrains
            - get_project_vcs_status # Retrieves the current version control status of files in the project
            # Git (Reference)
            - git_status # Shows the working tree status
          create_new_file_with_text:
            # JetBrains
            - create_new_file_with_text # Creates a new file at the specified path within the project directory and populates it with the provided text
          execute_action_by_id:
            # JetBrains
            - execute_action_by_id # Executes an action by its ID in JetBrains IDE editor
          execute_terminal_command:
            # JetBrains
            - execute_terminal_command # Executes a terminal command in JetBrains IDE editor
          find_commit_by_message:
            # JetBrains
            - find_commit_by_message # Searches for a commit based on the provided text or keywords in the project history
          find_files_by_name_substring:
            # JetBrains
            - find_files_by_name_substring # Searches for all files in the project whose names contain the specified substring
          get_all_open_file_paths:
            # JetBrains
            - get_all_open_file_paths # Lists full path relative paths to project root of all currently open files
          get_all_open_file_texts:
            # JetBrains
            - get_all_open_file_texts # Returns text of all currently open files in the JetBrains IDE editor
          get_debugger_breakpoints:
            # JetBrains
            - get_debugger_breakpoints # Retrieves a list of all line breakpoints currently set in the project
          get_file_text_by_path:
            # JetBrains
            - get_file_text_by_path # Retrieves the text content of a file using its path relative to project root
          get_open_in_editor_file_path:
            # JetBrains
            - get_open_in_editor_file_path # Retrieves the absolute path of the currently active file in the JetBrains IDE editor
          get_open_in_editor_file_text:
            # JetBrains
            - get_open_in_editor_file_text # Retrieves the complete text content of the currently active file
          get_progress_indicators:
            # JetBrains
            - get_progress_indicators # Retrieves the status of all running progress indicators
          get_project_dependencies:
            # JetBrains
            - get_project_dependencies # Get list of all dependencies defined in the project
          get_project_modules:
            # JetBrains
            - get_project_modules # Get list of all modules in the project with their dependencies
          get_run_configurations:
            # JetBrains
            - get_run_configurations # Returns a list of run configurations for the current project
          get_selected_in_editor_text:
            # JetBrains
            - get_selected_in_editor_text # Retrieves the currently selected text from the active editor
          get_terminal_text:
            # JetBrains
            - get_terminal_text # Retrieves the current text content from the first active terminal
          list_available_actions:
            # JetBrains
            - list_available_actions # Lists all available actions in the JetBrains IDE editor with their IDs and descriptions
          open_file_in_editor:
            # JetBrains
            - open_file_in_editor # Opens the specified file in the JetBrains IDE editor
          replace_current_file_text:
            # JetBrains
            - replace_current_file_text # Replaces the entire content of the currently active file
          replace_file_text_by_path:
            # JetBrains
            - replace_file_text_by_path # Replaces the entire content of a specified file with new text
          replace_selected_text:
            # JetBrains
            - replace_selected_text # Replaces the currently selected text in the active editor
          replace_specific_text:
            # JetBrains
            - replace_specific_text # Replaces specific text occurrences in a file with new text
          run_configuration:
            # JetBrains
            - run_configuration # Run a specific run configuration in the current project
          search_in_files_content:
            # JetBrains
            - search_in_files_content # Searches for a text substring within all files in the project
          toggle_debugger_breakpoint:
            # JetBrains
            - toggle_debugger_breakpoint # Toggles a debugger breakpoint at the specified line in a project file
          wait:
            # JetBrains
            - wait # Waits for a specified number of milliseconds
          sequentialthinking:
            # Sequential Thinking (Reference)
            - sequentialthinking # A detailed tool for dynamic and reflective problem-solving through thoughts. This tool helps analyze problems through a flexible thinking process that can adapt and evolve. Each thought can build on, question, or revise previous insights as understanding deepens. When to use this tool: - Breaking down complex problems into steps - Planning and design with room for revision - Analysis that might need course correction - Problems where the full scope might not be clear initially - Problems that require a multi-step solution - Tasks that need to maintain context over multiple steps - Situations where irrelevant information needs to be filtered out Key features: - You can adjust total_thoughts up or down as you progress - You can question or revise previous thoughts - You can add more thoughts even after reaching what seemed like the end - You can express uncertainty and explore alternative approaches - Not every thought needs to build linearly - you can branch or backtrack - Generates a solution hypothesis - Verifies the hypothesis based on the Chain of Thought steps - Repeats the process until satisfied - Provides a correct answer Parameters explained: - thought: Your current thinking step, which can include: * Regular analytical steps * Revisions of previous thoughts * Questions about previous decisions * Realizations about needing more analysis * Changes in approach * Hypothesis generation * Hypothesis verification - next_thought_needed: True if you need more thinking, even if at what seemed like the end - thought_number: Current number in sequence (can go beyond initial total if needed) - total_thoughts: Current estimate of thoughts needed (can be adjusted up/down) - is_revision: A boolean indicating if this thought revises previous thinking - revises_thought: If is_revision is true, which thought number is being reconsidered - branch_from_thought: If branching, which thought number is the branching point - branch_id: Identifier for the current branch (if any) - needs_more_thoughts: If reaching end but realizing more thoughts needed You should: 1. Start with an initial estimate of needed thoughts, but be ready to adjust 2. Feel free to question or revise previous thoughts 3. Don't hesitate to add more thoughts if needed, even at the "end" 4. Express uncertainty when present 5. Mark thoughts that revise previous thinking or branch into new paths 6. Ignore information that is irrelevant to the current step 7. Generate a solution hypothesis when appropriate 8. Verify the hypothesis based on the Chain of Thought steps 9. Repeat the process until satisfied with the solution 10. Provide a single, ideally correct answer as the final output 11. Only set next_thought_needed to false when truly done and a satisfactory answer is reached
